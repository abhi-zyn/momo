<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1a0e08">
<meta name="description" content="Momo — a scroll-powered morning at the hollow.">
<title>Momo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --warm-1: #ffd28a;
    --warm-2: #ff8c3a;
    --warm-3: #c4471a;
    --ink:    #1a0e08;
    --paper:  #fff6e6;
  }

  /* IMPORTANT: do NOT set height:100% on html/body or the body becomes a
     finite scroll container (esp. with overflow-x: hidden), which makes
     window.scrollY stay at 0 and breaks scroll-driven animations. */
  html { background: var(--ink); }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow-x: clip;
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* Tall scroll driver creates the scroll length */
  .driver { height: 1400vh; position: relative; pointer-events: none; }

  /* Fixed stage that holds the canvas */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #2a160c 0%, #120804 70%, #060302 100%);
    z-index: 0;
  }

  canvas#frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Vignette + warm grade */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%),
      linear-gradient(180deg, rgba(255,170,80,.06), transparent 30%, transparent 70%, rgba(60,20,5,.25));
    mix-blend-mode: multiply;
  }

  /* Soft floating dust motes */
  .motes { position: absolute; inset: 0; pointer-events: none; }
  .mote {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255, 220, 160, .8);
    box-shadow: 0 0 6px rgba(255, 200, 120, .6);
    animation: drift var(--d, 9s) linear infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(.6); opacity: 0; }
    10%  { opacity: .9; }
    90%  { opacity: .9; }
    100% { transform: translate(var(--dx, 20px), -120vh) scale(1); opacity: 0; }
  }

  /* ---------- Top progress bar ---------- */
  .progress {
    position: fixed;
    left: 0; top: 0;
    width: 100%;
    height: 3px;
    background: rgba(255, 220, 160, .12);
    z-index: 20;
  }
  .progress::after {
    content: '';
    display: block;
    height: 100%;
    width: calc(var(--p, 0) * 100%);
    background: linear-gradient(90deg, var(--warm-1), var(--warm-2), var(--warm-3));
    box-shadow: 0 0 8px rgba(255, 170, 80, .6);
    transition: width .08s linear;
  }

  /* ---------- Title ---------- */
  .title {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 0 24px max(14vh, env(safe-area-inset-bottom, 0px));
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity .5s ease, transform .5s ease;
  }
  .title h1 {
    font-size: clamp(56px, 18vw, 120px);
    font-weight: 800;
    letter-spacing: -.04em;
    line-height: .9;
    background: linear-gradient(180deg, #fff3d6 0%, #ffb84a 65%, #ff7a1a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 4px 24px rgba(255, 130, 40, .25);
    margin-bottom: 10px;
  }
  .title p {
    font-size: 13px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, .8);
  }
  .title.hidden { opacity: 0; transform: translateY(-8px); }

  /* ---------- Scroll hint ---------- */
  .hint {
    position: fixed;
    left: 50%;
    bottom: max(5vh, env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, .7);
    z-index: 10;
    pointer-events: none;
    transition: opacity .4s ease;
    text-align: center;
  }
  .hint .arrow {
    display: block;
    margin: 8px auto 0;
    width: 12px; height: 12px;
    border-right: 2px solid rgba(255, 235, 200, .8);
    border-bottom: 2px solid rgba(255, 235, 200, .8);
    transform: rotate(45deg);
    animation: bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: rotate(45deg) translate(0, 0); opacity: .35; }
    50%      { transform: rotate(45deg) translate(3px, 3px); opacity: 1; }
  }

  }

  /* ---------- Loader ---------- */
  .loader {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, #2a160c 0%, #080402 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity .6s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-name {
    font-size: clamp(48px, 16vw, 96px);
    font-weight: 800;
    letter-spacing: -.04em;
    background: linear-gradient(180deg, #fff3d6 0%, #ffb84a 70%, #ff7a1a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 22px;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,170,80,0)); }
    50%      { transform: scale(1.02); filter: drop-shadow(0 0 18px rgba(255,170,80,.25)); }
  }
  .loader-bar {
    width: min(64vw, 240px);
    height: 4px;
    background: rgba(255, 220, 160, .14);
    border-radius: 999px;
    overflow: hidden;
  }
  .loader-bar > div {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--warm-1), var(--warm-2), var(--warm-3));
    transition: width .15s ease;
    border-radius: 999px;
  }
  .loader-text {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, .65);
  }

  /* ---------- End screen ---------- */
  .end {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity .5s ease;
    z-index: 9;
  }
  .end .pill {
    background: rgba(20, 10, 5, .55);
    border: 1px solid rgba(255, 220, 160, .25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 14px 22px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: #fff3d6;
  }

  .brand {
    position: fixed;
    top: 14px;
    left: 14px;
    font-size: 12px;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, .55);
    z-index: 10;
    pointer-events: none;
  }
  .brand b { color: #ffb84a; font-weight: 700; }

  /* ---------- Audio toggle button ---------- */
  .audio-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 30;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255, 220, 160, .25);
    background: rgba(20, 10, 5, .55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff3d6;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .2s ease, background .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .audio-btn:active { transform: scale(.93); }
  .audio-btn svg { width: 22px; height: 22px; }
  .audio-btn .on  { display: none; }
  .audio-btn.is-on .off { display: none; }
  .audio-btn.is-on .on  { display: block; }
  .audio-btn.pulse { animation: btnPulse 1.6s ease-out 1; }
  @keyframes btnPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 170, 80, .55); }
    100% { box-shadow: 0 0 0 16px rgba(255, 170, 80, 0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .mote, .loader-name { animation: none !important; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loader" id="loader" role="status" aria-live="polite">
  <div class="loader-name">momo</div>
  <div class="loader-bar"><div id="loader-fill"></div></div>
  <div class="loader-text" id="loader-text">waking up… 0%</div>
</div>

<!-- Brand mark -->
<div class="brand">project · <b>momo</b></div>

<!-- Audio toggle -->
<button class="audio-btn pulse" id="audio-btn" aria-label="Toggle sound" type="button">
  <svg class="off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
  <svg class="on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
  </svg>
</button>

<!-- Top progress bar -->
<div class="progress" id="progress"></div>

<!-- Stage -->
<div class="stage" aria-hidden="true">
  <canvas id="frame"></canvas>
  <div class="vignette"></div>
  <div class="motes" id="motes"></div>
</div>

<!-- Title overlay (shown at the very start) -->
<div class="title" id="title">
  <h1>Momo</h1>
  <p>a morning at the hollow</p>
</div>

<!-- Scroll hint -->
<div class="hint" id="hint">scroll the story<span class="arrow"></span></div>


<!-- End overlay -->
<div class="end" id="end"><div class="pill">★ scroll up to replay ★</div></div>

<!-- Tall scroll driver -->
<div class="driver"></div>

<script>
(() => {
  'use strict';

  // ---------- Config ----------
  const SECTIONS = [
    { count: 192, path: (i) => `assets/images/1-2frame/frame-${String(i).padStart(3,'0')}.jpg`, w: 540, h: 900 },
    { count: 210, path: (i) => `assets/images/2-3frame/frame-${String(i).padStart(3,'0')}.jpg`, w: 720, h: 1200 },
  ];
  const TOTAL_FRAMES   = SECTIONS.reduce((s, sec) => s + sec.count, 0);
  const FRAME_COUNT    = TOTAL_FRAMES;
  const FRAME_PATH     = (i) => {
    let offset = 0;
    for (const sec of SECTIONS) {
      if (i <= offset + sec.count) return sec.path(i - offset);
      offset += sec.count;
    }
    const last = SECTIONS[SECTIONS.length - 1];
    return last.path(last.count);
  };
  function getFrameDimensions(idx) {
    let offset = 0;
    for (const sec of SECTIONS) {
      if (idx < offset + sec.count) return { w: sec.w, h: sec.h };
      offset += sec.count;
    }
    const last = SECTIONS[SECTIONS.length - 1];
    return { w: last.w, h: last.h };
  }
  const PRELOAD_LIMIT  = 6;
  const READY_FRAMES   = 16;
  const FRAME_W        = 540;
  const FRAME_H        = 900;

  // ---------- Refs ----------
  const canvas      = document.getElementById('frame');
  const ctx         = canvas.getContext('2d', { alpha: false });
  const loader      = document.getElementById('loader');
  const loaderFill  = document.getElementById('loader-fill');
  const loaderText  = document.getElementById('loader-text');
  const progressEl  = document.getElementById('progress');
  const titleEl     = document.getElementById('title');
  const hintEl      = document.getElementById('hint');
  const endEl       = document.getElementById('end');
  const motesEl     = document.getElementById('motes');

  // ---------- Helpers ----------
  const clamp = (v, a = 0, b = 1) => Math.max(a, Math.min(b, v));
  const lerp  = (p, a, b) => clamp((p - a) / (b - a));


  // ============================================================
  // Audio — plays extracted video audio synced to scroll
  // ============================================================
  const Audio = (() => {
    let ctx, master;
    let booted = false, muted = true;
    const buffers = { scene1: null, scene2: null };

    function gain(v = 0) { const g = ctx.createGain(); g.gain.value = v; return g; }

    async function loadBuffer(url) {
      try {
        const r = await fetch(url, { cache: 'force-cache' });
        if (!r.ok) return null;
        return await ctx.decodeAudioData(await r.arrayBuffer());
      } catch(e) { return null; }
    }

    // Scene audio players
    let s1Src = null, s1Playing = false, s1Pause = null;
    let s2Src = null, s2Playing = false, s2Pause = null;

    function playScene(num, p) {
      const sec1End = 192 / TOTAL_FRAMES;
      const buf = num === 1 ? buffers.scene1 : buffers.scene2;
      if (!buf || muted) return;
      const inRange = num === 1 ? (p <= sec1End) : (p >= sec1End);
      if (!inRange) { stopScene(num); return; }
      const localP = num === 1 ? p / sec1End : (p - sec1End) / (1 - sec1End);
      const time = localP * buf.duration;
      if (num === 1 && !s1Playing) {
        if (s1Src) try { s1Src.stop(); } catch(e){}
        s1Src = ctx.createBufferSource();
        s1Src.buffer = buf;
        s1Src.connect(master);
        s1Src.start(0, time);
        s1Playing = true;
        s1Src.onended = () => { s1Playing = false; };
      }
      if (num === 2 && !s2Playing) {
        if (s2Src) try { s2Src.stop(); } catch(e){}
        s2Src = ctx.createBufferSource();
        s2Src.buffer = buf;
        s2Src.connect(master);
        s2Src.start(0, time);
        s2Playing = true;
        s2Src.onended = () => { s2Playing = false; };
      }
    }

    function stopScene(num) {
      if (num === 1 && s1Playing) { try { s1Src.stop(); } catch(e){} s1Playing = false; }
      if (num === 2 && s2Playing) { try { s2Src.stop(); } catch(e){} s2Playing = false; }
    }

    function onScroll(p) {
      if (!booted || muted) return;
      playScene(1, p);
      playScene(2, p);
      clearTimeout(s1Pause); clearTimeout(s2Pause);
      s1Pause = setTimeout(() => stopScene(1), 150);
      s2Pause = setTimeout(() => stopScene(2), 150);
    }

    function init() {
      if (booted) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      ctx = new Ctx();
      master = gain(0);
      master.connect(ctx.destination);
      loadBuffer('assets/audio/1-2.mp3').then(b => { buffers.scene1 = b; });
      loadBuffer('assets/audio/2-3.mp3').then(b => { buffers.scene2 = b; });
      booted = true;
    }

    async function unmute() {
      if (!booted) init();
      if (!ctx) return;
      if (ctx.state === 'suspended') await ctx.resume();
      master.gain.linearRampToValueAtTime(1.0, ctx.currentTime + 0.08);
      muted = false;
    }
    function mute() {
      if (!ctx) return;
      master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
      stopScene(1); stopScene(2);
      muted = true;
    }
    function isMuted() { return muted; }

    return { init, unmute, mute, isMuted, onScroll };
  })();

  // ---------- Build dust motes ----------
  for (let i = 0; i < 14; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left = (Math.random() * 100) + '%';
    m.style.top  = (60 + Math.random() * 50) + '%';
    m.style.setProperty('--d', (8 + Math.random() * 8) + 's');
    m.style.setProperty('--dx', (Math.random() * 60 - 30) + 'px');
    m.style.setProperty('--delay', (-Math.random() * 12) + 's');
    motesEl.appendChild(m);
  }

  // ---------- Canvas sizing (HiDPI + cover fit) ----------
  let viewW = 0, viewH = 0, dpr = 1;
  function resize() {
    dpr   = Math.min(window.devicePixelRatio || 1, 2.5);
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    canvas.width  = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    canvas.style.width  = viewW + 'px';
    canvas.style.height = viewH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawCurrent();
  }

  // Cover-fit: crop to fill, never letterbox
  function drawImageCover(img) {
    if (!img || !img.complete || img.naturalWidth === 0) return;
    const dims = getFrameDimensions(currentFrame >= 0 ? currentFrame : 0);
    const ir = dims.w / dims.h;
    const cr = viewW / viewH;
    let dw, dh, dx, dy;
    if (cr > ir) { dw = viewW; dh = viewW / ir; dx = 0; dy = (viewH - dh) / 2; }
    else         { dh = viewH; dw = viewH * ir; dy = 0; dx = (viewW - dw) / 2; }
    ctx.fillStyle = '#0a0503';
    ctx.fillRect(0, 0, viewW, viewH);
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  // ---------- Image preloading ----------
  const images = new Array(FRAME_COUNT);
  let loadedCount = 0;

  function setLoaderProgress() {
    const pct = Math.round((loadedCount / FRAME_COUNT) * 100);
    loaderFill.style.width = pct + '%';
    loaderText.textContent = `waking up… ${pct}%`;
  }

  function loadFrame(i) {
    return new Promise((resolve) => {
      const img = new Image();
      img.decoding = 'async';
      const done = () => { loadedCount++; setLoaderProgress(); resolve(img); };
      img.onload  = done;
      img.onerror = done;
      img.src = FRAME_PATH(i + 1);
      images[i] = img;
    });
  }

  async function preloadInitial() {
    // Load first READY_FRAMES in parallel (browser will queue at HTTP limit)
    await Promise.all(
      Array.from({ length: Math.min(READY_FRAMES, FRAME_COUNT) }, (_, i) => loadFrame(i))
    );
  }

  async function preloadRest() {
    let next = READY_FRAMES;
    const workers = Array.from({ length: PRELOAD_LIMIT }, async () => {
      while (next < FRAME_COUNT) {
        const i = next++;
        await loadFrame(i);
      }
    });
    await Promise.all(workers);
  }

  // ---------- Frame rendering ----------
  let currentFrame = -1;
  function drawCurrent() {
    if (currentFrame < 0) return;
    const img = images[currentFrame];
    if (img && img.complete && img.naturalWidth > 0) {
      drawImageCover(img);
      return;
    }
    // Fallback: nearest already-loaded frame so scrubbing never goes blank
    for (let r = 1; r < 12; r++) {
      const a = images[currentFrame - r];
      const b = images[currentFrame + r];
      if (a && a.complete && a.naturalWidth > 0) { drawImageCover(a); return; }
      if (b && b.complete && b.naturalWidth > 0) { drawImageCover(b); return; }
    }
  }

  function setFrame(idx) {
    idx = clamp(idx | 0, 0, FRAME_COUNT - 1);
    if (idx === currentFrame) return;
    currentFrame = idx;
    drawCurrent();
  }


  // ---------- Smooth scroll-driven update loop ----------
  // Strategy: track a target progress derived from scrollY, and a displayed
  // progress that lerps toward the target every animation frame. This
  // replaces the old "round to nearest frame on every scroll event" approach
  // and produces buttery scrubbing on touch devices where scroll delivery
  // can be coarse during momentum phases.

  let targetProgress    = 0;   // where the scroll says we should be (0..1)
  let displayedProgress = 0;   // what we're actually painting (0..1)
  let rafId             = null;
  let lastRenderedIdx   = -1;
  const SMOOTHING       = 0.12;  // higher = snappier, lower = floatier (buttery)
  const SETTLE_EPS      = 0.0002;

  function readScrollProgress() {
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
    const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
    return clamp(scrollTop / max);
  }

  function ensureLoop() {
    if (rafId === null) rafId = requestAnimationFrame(loop);
  }

  function loop() {
    const diff = targetProgress - displayedProgress;
    if (Math.abs(diff) < SETTLE_EPS) {
      displayedProgress = targetProgress;
      render(displayedProgress);
      rafId = null;          // settle: stop the loop until scroll resumes
      return;
    }
    displayedProgress += diff * SMOOTHING;
    render(displayedProgress);
    rafId = requestAnimationFrame(loop);
  }

  function render(p) {
    progressEl.style.setProperty('--p', p);

    const idx = Math.round(p * (FRAME_COUNT - 1));
    if (idx !== lastRenderedIdx) {
      setFrame(idx);
      lastRenderedIdx = idx;
    }
    Audio.onScroll(p);

    if (p > 0.015) titleEl.classList.add('hidden');
    else titleEl.classList.remove('hidden');

    hintEl.style.opacity = String(clamp(1 - p * 18));
    endEl.style.opacity = String(lerp(p, 0.985, 1.0));
  }

  function onScroll() {
    targetProgress = readScrollProgress();
    ensureLoop();
  }
  function onResize() {
    targetProgress = readScrollProgress();
    // Snap on resize so layout changes don't trigger a slow re-scrub
    displayedProgress = targetProgress;
    render(displayedProgress);
  }

  // Backwards-compat shim used by startExperience()'s initial paint.
  function update() { onScroll(); }

  // ---------- Boot ----------
  let started = false;
  function startExperience() {
    if (started) return;
    started = true;

    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 700);

    setFrame(0);
    // Seed both progresses to current scroll, paint immediately, then
    // hand off to the smooth rAF loop on subsequent scroll events.
    targetProgress = displayedProgress = readScrollProgress();
    render(displayedProgress);

    window.addEventListener('scroll', onScroll, { passive: true });
    document.addEventListener('scroll', onScroll, { passive: true });

    // Dismiss hint on first interaction
    ['touchstart', 'wheel', 'keydown'].forEach((ev) => {
      window.addEventListener(ev, () => { hintEl.style.opacity = '0'; }, { once: true, passive: true });
    });

    // Audio toggle button
    const audioBtn = document.getElementById('audio-btn');
    audioBtn.addEventListener('click', async () => {
      audioBtn.classList.remove('pulse');
      if (Audio.isMuted()) {
        await Audio.unmute();
        audioBtn.classList.add('is-on');
        audioBtn.setAttribute('aria-label', 'Mute sound');
        // Play any SFX whose moment is happening on screen right now,
        // so the user doesn't miss the yawn just because they unmuted late.
      } else {
        Audio.mute();
        audioBtn.classList.remove('is-on');
        audioBtn.setAttribute('aria-label', 'Unmute sound');
      }
    });
  }

  async function boot() {
    resize();
    window.addEventListener('resize', () => { resize(); onResize(); });
    window.addEventListener('orientationchange', () => setTimeout(() => { resize(); onResize(); }, 100));

    // Safety net: never let the loader hang forever
    setTimeout(startExperience, 12000);

    await preloadInitial();
    startExperience();   // unlock scrolling + animation immediately
    preloadRest();       // continue loading the rest in the background
  }

  boot();
})();
</script>
